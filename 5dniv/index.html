<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ITStart — завантаження</title>
  <meta name="robots" content="noindex">
  <style>
    html,body{margin:0;min-height:100%;background:#fff8f3;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
    .loader{min-height:100vh;display:grid;place-items:center;color:#412a4c;font-weight:800}
  </style>
</head>
<body>
  <div class="loader">Завантаження…</div>
  <script>
    (async () => {
      try {
        const response = await fetch('../index.html', { cache: 'no-store' });
        if (!response.ok) throw new Error('Не вдалося завантажити основний ленд');

        let html = await response.text();

        html = html
          .replace(/<meta name='theme-color' content='[^']*'>/, "<meta name='theme-color' content='#fff8f3'>")
          .replace(/<meta property='og:url' content='[^']*'>/, "<meta property='og:url' content='https://itstart.com.ua/5dniv/'>")
          .replace(/<link rel='canonical' href='[^']*'>/, "<link rel='canonical' href='https://itstart.com.ua/5dniv/'>")
          .replace(/href='assets\//g, "href='../assets/")
          .replace(/src='assets\//g, "src='../assets/")
          .replace(/href='privacy\.html'/g, "href='../privacy.html'")
          .replace(/href='offer\.html'/g, "href='../offer.html'")
          .replace('</head>', "<link rel='stylesheet' href='theme.css?v=1'></head>")
          .replace('<body>', "<body class='variant-5dniv'>");

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loader">Не вдалося завантажити сторінку. <a href="../">Перейти на головну</a></div>';
      }
    })();
  </script>
</body>
</html>
